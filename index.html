<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈퍼볼(Superball) 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div class="theme-toggle-wrap">
        <i class="fas fa-sun toggle-icon" id="icon-sun"></i>
        <label class="switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="slider"></span>
        </label>
        <i class="fas fa-moon toggle-icon" id="icon-moon"></i>
    </div>
    <div class="container">
        <h1>슈퍼볼 번호 생성기</h1>
        <p class="subtitle">행운의 5개 번호와 1개 파워볼 번호를 확인하세요!</p>
        
        <div id="ball-container" class="ball-container">
            <div class="ball-wrapper">
                <div class="ball white-ball">?</div>
                <span class="ball-count">-</span>
            </div>
            <div class="ball-wrapper">
                <div class="ball white-ball">?</div>
                <span class="ball-count">-</span>
            </div>
            <div class="ball-wrapper">
                <div class="ball white-ball">?</div>
                <span class="ball-count">-</span>
            </div>
            <div class="ball-wrapper">
                <div class="ball white-ball">?</div>
                <span class="ball-count">-</span>
            </div>
            <div class="ball-wrapper">
                <div class="ball white-ball">?</div>
                <span class="ball-count">-</span>
            </div>
            <div class="ball-wrapper">
                <div class="ball power-ball">?</div>
                <span class="ball-count">-</span>
            </div>
        </div>

        <button id="generate-btn">번호 생성하기</button>

        <p class="data-source">* 실제 파워볼 역대 당첨 데이터 기반 (2015년 현행 룰 적용 이후)</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
