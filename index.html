<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈퍼볼(Superball) 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>슈퍼볼 번호 생성기</h1>
        <p class="subtitle">행운의 5개 번호와 1개 파워볼 번호를 확인하세요!</p>
        
        <div id="ball-container" class="ball-container">
            <div class="ball white-ball">?</div>
            <div class="ball white-ball">?</div>
            <div class="ball white-ball">?</div>
            <div class="ball white-ball">?</div>
            <div class="ball white-ball">?</div>
            <div class="ball power-ball">?</div>
        </div>

        <button id="generate-btn">번호 생성하기</button>

        <div class="history-section">
            <h2>최근 생성 번호</h2>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
